<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التسعير - الاتحاد</title>

<style>
*{ box-sizing:border-box; }

html, body{
    margin:0;
    padding:0;
    height:100%;
    background:linear-gradient(180deg,#000000,#0b0f1c);
    font-family:Arial,sans-serif;
    direction:rtl;
    color:white;
    overflow:hidden;
}

.screen{
    position:relative;
    width:100%;
    height:100%;
}

.page{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    transform:translateX(100%);
    opacity:0;
    transition:0.8s ease;
}

.page.active{
    transform:translateX(0);
    opacity:1;
}

.page.exit{
    transform:translateX(-100%);
    opacity:0;
}

.container{
    width:95%;
    padding-top:2vh;
    text-align:center;
    display:flex;
    flex-direction:column;
    height:100%;
}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin-bottom:2vh;
}

.header img{
    height:16vh;
    filter: drop-shadow(0 0 25px #f4c430);
}

.header h1{
    font-size:8vh;
    color:#1f6fff;
    margin:0;
}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 0.8vh;
}

th{
    background:linear-gradient(90deg,#1f3c88,#0d6efd);
    font-size:4.5vh;
    padding:1.5vh;
}

td{
    font-size:6.5vh;
    padding:1.5vh;
    font-weight:bold;
    background:rgba(255,255,255,0.05);
}

td:nth-child(2){ color:#00e676; }
td:nth-child(3){ color:#f4c430; }

.flag-img{
    width:60px;
    height:40px;
}

.up { color:#00e676; font-size:3vh; margin-right:8px; }
.down { color:#ff3d00; font-size:3vh; margin-right:8px; }

/* وميض عند التغيير */
.flash {
    animation: flashAnim 0.4s ease;
}

@keyframes flashAnim {
    0% { background:rgba(255,255,255,0.1); }
    100% { background:transparent; }
}

.alert-page{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.alert-title{
    font-size:6vh;
    color:#00ffd5;
    margin-bottom:20px;
}

.alert-text{
    font-size:7vh;
    font-weight:bold;
    max-width:85%;
    background:linear-gradient(135deg,#0d6efd,#1f3c88);
    padding:60px 80px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,150,255,0.6);
    opacity:0;
    transform:scale(0.9);
    transition:0.6s ease;
}

.alert-text.show{
    opacity:1;
    transform:scale(1);
}
</style>
</head>

<body>

<div class="screen">

<!-- الأسعار -->
<div class="page active" id="page1">
<div class="container">

  <div class="header">
    <h1>أسعار الصرافة</h1>
    <img src="https://i.postimg.cc/wvrQMV5X/IMG-20250610-WA0000.png">
  </div>

  <table>
    <tr><th>الزوج</th><th>شراء</th><th>بيع</th></tr>

    <tr>
      <td><img class="flag-img" src="https://flagcdn.com/w80/us.png"> / <img class="flag-img" src="https://flagcdn.com/w80/sy.png"></td>
      <td><span id="buy1">11800</span></td>
      <td><span id="sell1">11900</span></td>
    </tr>

    <tr>
      <td><img class="flag-img" src="https://flagcdn.com/w80/tr.png"> / <img class="flag-img" src="https://flagcdn.com/w80/sy.png"></td>
      <td><span id="buy2">268</span></td>
      <td><span id="sell2">272</span></td>
    </tr>

    <tr>
      <td><img class="flag-img" src="https://flagcdn.com/w80/eu.png"> / <img class="flag-img" src="https://flagcdn.com/w80/sy.png"></td>
      <td><span id="buy3">13450</span></td>
      <td><span id="sell3">13600</span></td>
    </tr>

    <tr>
      <td><img class="flag-img" src="https://flagcdn.com/w80/us.png"> / <img class="flag-img" src="https://flagcdn.com/w80/tr.png"></td>
      <td><span id="buy4">43.7</span></td>
      <td><span id="sell4">44</span></td>
    </tr>

    <tr>
      <td><img class="flag-img" src="https://flagcdn.com/w80/eu.png"> / <img class="flag-img" src="https://flagcdn.com/w80/us.png"></td>
      <td><span id="buy5">1.14</span></td>
      <td><span id="sell5">1.16</span></td>
    </tr>

  </table>

</div>
</div>

<!-- التنبيهات -->
<div class="page" id="page2">
<div class="alert-page">
  <div class="alert-title">تنبيهات</div>
  <div class="alert-text" id="alertText"></div>
</div>
</div>

</div>

<script>

let oldPrices = {};
let direction = {};

/* 🔊 صوت احترافي بدون ملفات */
function playSound(){
    try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();

        let osc = ctx.createOscillator();
        let gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = 800; // نغمة تنبيه صرافة

        gain.gain.value = 0.1;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();

        setTimeout(()=>{
            osc.stop();
            ctx.close();
        }, 150);

    } catch(e){
        console.log("Audio error");
    }
}

/* تحديث الخلايا */
function updateCell(id, value){
    let el = document.getElementById(id);

    if(oldPrices[id] !== undefined){

        if(Number(value) > Number(oldPrices[id])){
            direction[id] = "up";
            playSound();
        } 
        else if(Number(value) < Number(oldPrices[id])){
            direction[id] = "down";
            playSound();
        }

        document.body.classList.add("flash");
        setTimeout(()=>document.body.classList.remove("flash"),300);
    }

    oldPrices[id] = value;

    let arrow = "";

    if(direction[id] === "up"){
        arrow = " <span class='up'>▲</span>";
    } else if(direction[id] === "down"){
        arrow = " <span class='down'>▼</span>";
    }

    el.innerHTML = value + arrow;
}

/* تحديث الأسعار */
function updatePrices(){
    for(let i=1;i<=5;i++){
        let buy = localStorage.getItem("buy"+i);
        let sell = localStorage.getItem("sell"+i);

        if(buy) updateCell("buy"+i, buy);
        if(sell) updateCell("sell"+i, sell);
    }
}

updatePrices();
setInterval(updatePrices, 5000);

</script>

</body>
</html>
